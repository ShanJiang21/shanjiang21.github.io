<!-- Navigation -->
<style>
  /* Site wordmark — italic "Shan" replaces the old Bootstrap brand text */
  .navbar-custom .navbar-brand.site-brand {
    font-family: 'Playfair Display', 'EB Garamond', Georgia, serif !important;
    font-style: italic;
    font-weight: 400;
    font-size: 1.9rem;
    letter-spacing: .01em;
    line-height: 1;
    padding-top: 18px;
    padding-bottom: 14px;
    color: #111;
    transition: opacity .2s ease, transform .2s ease;
  }
  .navbar-custom.invert .navbar-brand.site-brand { color: #111; }
  .navbar-custom .navbar-brand.site-brand:hover,
  .navbar-custom .navbar-brand.site-brand:focus {
    opacity: .68;
    transform: translateY(-1px);
    background: transparent;
    text-decoration: none;
  }

  /* Force dark nav text on every page (all pages now use light backgrounds).
     Overrides hux-blog's default white-on-dark-hero assumption. */
  .navbar-custom .navbar-brand,
  .navbar-custom .nav li a,
  .navbar-custom.is-fixed .navbar-brand,
  .navbar-custom.is-fixed .nav li a {
    color: #1a1a1a !important;
  }
  .navbar-custom .navbar-brand:hover,
  .navbar-custom .navbar-brand:focus,
  .navbar-custom .nav li a:hover,
  .navbar-custom .nav li a:focus {
    color: #c8001d !important;
  }
  /* Mobile hamburger bars */
  .navbar-custom .navbar-toggle .icon-bar { background-color: #1a1a1a !important; }
</style>
{% if page.nav-style == "invert" or page.header-style == "text" %}
<nav class="navbar navbar-default navbar-custom navbar-fixed-top invert">
    {% else %}
    <nav class="navbar navbar-default navbar-custom navbar-fixed-top">
        {% endif %}
        <div class="container-fluid">
            <!-- Brand and toggle get grouped for better mobile display -->
            <div class="navbar-header page-scroll">
                <button type="button" class="navbar-toggle">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand site-brand" href="{{ site.baseurl }}/">Shan</a>
            </div>

            <!-- Collect the nav links, forms, and other content for toggling -->
            <div id="huxblog_navbar">
                <div class="navbar-collapse">
                    <ul class="nav navbar-nav navbar-right">
                        <li>
                            <a href="{{ site.baseurl }}/writings/">Writings</a>
                        </li>
                        <li>
                            <a href="{{ site.baseurl }}/travel/">Travel</a>
                        </li>
                        <li>
                            <a href="{{ site.baseurl }}/sharing/">Sharing</a>
                        </li>
                        <li>
                            <a href="{{ site.baseurl }}/about/">About</a>
                        </li>
                        <li class="search-icon">
                            <a href="javascript:void(0)">
                                <i class="fa fa-search"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            <!-- /.navbar-collapse -->
        </div>
        <!-- /.container -->
    </nav>

    <script>
        // Drop Bootstarp low-performance Navbar
        // Use customize navbar with high-quality material design animation
        // in high-perf jank-free CSS3 implementation
        var $body = document.body;
        var $toggle = document.querySelector('.navbar-toggle');
        var $navbar = document.querySelector('#huxblog_navbar');
        var $collapse = document.querySelector('.navbar-collapse');

        var __HuxNav__ = {
            close: function () {
                $navbar.className = " ";
                // wait until animation end.
                setTimeout(function () {
                    // prevent frequently toggle
                    if ($navbar.className.indexOf('in') < 0) {
                        $collapse.style.height = "0px"
                    }
                }, 400)
            },
            open: function () {
                $collapse.style.height = "auto"
                $navbar.className += " in";
            }
        }

        // Bind Event
        $toggle.addEventListener('click', function (e) {
            if ($navbar.className.indexOf('in') > 0) {
                __HuxNav__.close()
            } else {
                __HuxNav__.open()
            }
        })

        /**
         * Since Fastclick is used to delegate 'touchstart' globally
         * to hack 300ms delay in iOS by performing a fake 'click',
         * Using 'e.stopPropagation' to stop 'touchstart' event from 
         * $toggle/$collapse will break global delegation.
         * 
         * Instead, we use a 'e.target' filter to prevent handler
         * added to document close HuxNav.  
         *
         * Also, we use 'click' instead of 'touchstart' as compromise
         */
        document.addEventListener('click', function (e) {
            if (e.target == $toggle) return;
            if (e.target.className == 'icon-bar') return;
            __HuxNav__.close();
        })
    </script>
