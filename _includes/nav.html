<!-- Navigation — Cup-of-Jo style: split nav with centered "A CUP OF SHAN" wordmark -->
<style>
  /* Hide the Bootstrap navbar entirely; we render our own. */
  .navbar-custom { display: none !important; }

  .acos-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #f8efe2;          /* warm peach, à la Cup of Jo */
    border-bottom: 1px solid #ecdfca;
    font-family: 'Fraunces', 'EB Garamond', Georgia, serif;
  }
  .acos-nav__inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 1.1rem 2rem;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 2rem;
  }

  .acos-nav__list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
  }
  .acos-nav__list--left { justify-content: flex-start; gap: 2.4rem; }
  .acos-nav__list--right { justify-content: flex-end; gap: 2.4rem; }

  .acos-nav__list a {
    font-family: 'Fraunces', 'EB Garamond', Georgia, serif;
    font-size: 1.05rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: #1a1a1a;
    text-decoration: none;
    padding: 0.4rem 0;
    border-bottom: 2px solid transparent;
    transition: color 0.2s ease, border-color 0.2s ease;
    font-variation-settings: "opsz" 72;
  }
  .acos-nav__list a:hover,
  .acos-nav__list a:focus {
    color: #c8001d;
    border-bottom-color: #c8001d;
    text-decoration: none;
  }
  .acos-nav__search {
    display: inline-flex;
    align-items: center;
    width: 1.6rem; height: 1.6rem;
    border-bottom: none !important;
    color: #1a1a1a;
    cursor: pointer;
  }
  .acos-nav__search svg { width: 1.05rem; height: 1.05rem; }

  /* Centered wordmark */
  .acos-brand {
    display: inline-flex;
    align-items: baseline;
    gap: 0.45em;
    text-decoration: none;
    color: #111;
    font-family: 'Fraunces', 'EB Garamond', Georgia, serif;
    font-weight: 500;
    line-height: 1;
    transition: opacity 0.2s ease;
    font-variation-settings: "opsz" 144;
  }
  .acos-brand:hover, .acos-brand:focus { color: #111; opacity: 0.7; text-decoration: none; }
  .acos-brand .acos-brand__a,
  .acos-brand .acos-brand__cup,
  .acos-brand .acos-brand__shan {
    font-size: clamp(1.6rem, 3vw, 2.45rem);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .acos-brand .acos-brand__cup { letter-spacing: 0.18em; }
  .acos-brand .acos-brand__of {
    font-size: clamp(0.95rem, 1.4vw, 1.2rem);
    font-style: italic;
    font-weight: 400;
    color: #1a1a1a;
    text-transform: lowercase;
    letter-spacing: 0.05em;
    transform: translateY(-3px);
  }
  .acos-brand .acos-brand__shan {
    font-style: italic;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: none;
  }

  /* Mobile menu */
  .acos-nav__toggle {
    display: none;
    background: transparent;
    border: 0;
    padding: 0.5rem;
    cursor: pointer;
    color: #1a1a1a;
  }
  .acos-nav__toggle svg { width: 24px; height: 24px; }

  /* Push the page content below the sticky bar (it has a peach bg now). */
  body { background: #fff; }

  @media (max-width: 860px) {
    .acos-nav__inner {
      grid-template-columns: auto 1fr auto;
      padding: 0.85rem 1.1rem;
      gap: 0.5rem;
    }
    .acos-nav__list--left,
    .acos-nav__list--right { display: none; }
    .acos-nav__toggle { display: inline-flex; justify-self: start; }
    .acos-nav__search-wrap { justify-self: end; }
    .acos-brand .acos-brand__a,
    .acos-brand .acos-brand__cup,
    .acos-brand .acos-brand__shan { font-size: 1.25rem; letter-spacing: 0.12em; }
    .acos-brand .acos-brand__of { font-size: 0.85rem; transform: translateY(-2px); }

    /* Slide-down mobile menu */
    .acos-mobile {
      display: none;
      grid-column: 1 / -1;
      padding: 0.5rem 1.1rem 1.2rem;
      border-top: 1px solid #ecdfca;
    }
    .acos-mobile.is-open { display: block; }
    .acos-mobile ul { list-style: none; margin: 0; padding: 0; }
    .acos-mobile li { padding: 0.55rem 0; }
    .acos-mobile a {
      font-family: 'Fraunces', 'EB Garamond', serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: #1a1a1a;
      text-decoration: none;
    }
    .acos-mobile a:hover { color: #c8001d; }
  }
</style>

<nav class="acos-nav" aria-label="Primary">
  <div class="acos-nav__inner">

    <button type="button" class="acos-nav__toggle" id="acosToggle" aria-label="Open menu" aria-expanded="false" aria-controls="acosMobile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>

    <ul class="acos-nav__list acos-nav__list--left">
      <li><a href="{{ site.baseurl }}/about/">About</a></li>
      <li class="search-icon">
        <a href="javascript:void(0)" class="acos-nav__search" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        </a>
      </li>
    </ul>

    <a href="{{ site.baseurl }}/" class="acos-brand" aria-label="A Cup of Shan — home">
      <span class="acos-brand__a">A</span>
      <span class="acos-brand__cup">Cup</span>
      <span class="acos-brand__of">of</span>
      <span class="acos-brand__shan">Shan</span>
    </a>

    <ul class="acos-nav__list acos-nav__list--right">
      <li><a href="{{ site.baseurl }}/reading/">Readings</a></li>
      <li><a href="{{ site.baseurl }}/writings/">Writings</a></li>
      <li><a href="{{ site.baseurl }}/travel/">Travel</a></li>
    </ul>

    <div class="acos-mobile" id="acosMobile" aria-hidden="true">
      <ul>
        <li><a href="{{ site.baseurl }}/reading/">Readings</a></li>
        <li><a href="{{ site.baseurl }}/writings/">Writings</a></li>
        <li><a href="{{ site.baseurl }}/travel/">Travel</a></li>
        <li><a href="{{ site.baseurl }}/about/">About</a></li>
      </ul>
    </div>

  </div>
</nav>

<script>
  (function(){
    var toggle = document.getElementById('acosToggle');
    var menu = document.getElementById('acosMobile');
    if (!toggle || !menu) return;
    toggle.addEventListener('click', function(){
      var open = menu.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      menu.setAttribute('aria-hidden', open ? 'false' : 'true');
    });
  })();
</script>
