# Reading log — single source of truth for /reading/
#
# Required:
#   title    — book title
#   author   — author name(s)
#   year     — year you finished (used to group)
#
# Optional:
#   cover    — path under img/reading/  (e.g. "stoner.jpg"). If absent,
#              the page renders a typographic placeholder card.
#   rating   — 1-5 (renders dots; omit to hide)
#   status   — "reading" | "finished"  (default: finished)
#   favorite — true to surface in the All-Time Favourites row
#   month    — 1-12 (used to sort within a year)
#   takeaway — ONE sentence — the thing that stuck
#   highlights — list of short quotes you marked
#   notes_url — internal post link if you've written a longer review
#
# To add a book:
#   1. (optional) drop a cover at img/reading/<slug>.jpg, ~600px wide
#   2. add a block below
#   3. commit & push — done.
#
# Two example rows are commented out so you can see the shape.

# --- CURRENTLY READING ----------------------------------------------------

