# Travel log — one block per trip. Author-facing: this is the single source of truth.
#
# Fields:
#   place     — city / site name (required)
#   country   — country name (required)
#   lat, lon  — decimal degrees, e.g. lat: 35.0116  lon: 135.7681 (required, for the map pin)
#   date      — "YYYY-MM" (sorts and groups by year)
#   slug      — folder name under img/travel/<slug>/ (required if photos given)
#   photos    — list of filenames inside img/travel/<slug>/ (optional)
#   cover     — one of the photos to use as card hero (optional; defaults to photos[0])
#   note      — short prose, 1–3 sentences (optional)
#
# To add a trip:
#   1. Create folder img/travel/<slug>/ and drop your .jpg/.png files in it.
#   2. Append a new block below with lat/lon looked up on Google Maps
#      (right-click the location → "What's here?" → copy coords).
#   3. Commit + push. No code changes needed.
#
# Example block (uncomment and edit when you're ready to log a trip):
#
# - place: Kyoto
#   country: Japan
#   lat: 35.0116
#   lon: 135.7681
#   date: "2024-04"
#   slug: kyoto-2024
#   photos:
#     - philosophers-path.jpg
#   cover: philosophers-path.jpg
#   note: "Cherry blossoms on the Philosopher's Path."

